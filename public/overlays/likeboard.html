<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; overflow:hidden; width:100vw; height:100vh; }

body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,0,255,.012) 2px,rgba(255,0,255,.012) 4px);
}

#board {
  position:fixed;
  top:20px; right:20px;
  width:300px;
  display:flex; flex-direction:column; gap:6px;
}

/* ── HEADER ── */
.board-header {
  font-family:'Orbitron', monospace;
  font-size:10px; font-weight:900;
  color:#ff00ff;
  letter-spacing:.2em; text-transform:uppercase;
  text-shadow:0 0 12px #ff00ff, 0 0 24px #ff00ff88;
  padding:8px 12px;
  background:rgba(0,0,10,.7);
  border:1px solid rgba(255,0,255,.3);
  border-left:3px solid #ff00ff;
  border-radius:0 8px 8px 0;
  display:flex; align-items:center; gap:8px;
  backdrop-filter:blur(12px);
}
.board-header::before {
  content:'❤️';
  font-size:14px;
  animation:heartBeat .6s ease-in-out infinite;
}
@keyframes heartBeat {
  0%,100%{transform:scale(1)} 50%{transform:scale(1.3)}
}
.pulse-dot {
  width:6px; height:6px; border-radius:50%;
  background:#ff00ff; margin-left:auto;
  box-shadow:0 0 8px #ff00ff;
  animation:blinkDot .8s step-end infinite;
}
@keyframes blinkDot{50%{opacity:0}}

/* ── ROW ── */
.lb-row {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px 8px 8px;
  background:linear-gradient(110deg,rgba(0,0,15,.88),rgba(10,0,20,.88));
  border:1px solid rgba(255,0,255,.15);
  border-left:2px solid rgba(255,0,255,.5);
  border-radius:0 10px 10px 0;
  backdrop-filter:blur(10px);
  position:relative; overflow:hidden;
  transition:all .3s ease;
  animation:rowIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes rowIn {
  from{opacity:0;transform:translateX(30px) scale(.95)}
  to  {opacity:1;transform:translateX(0) scale(1)}
}

/* top 1 glow */
.lb-row.rank-1 {
  border-left:2px solid #ffff00;
  box-shadow:0 0 16px rgba(255,255,0,.15), inset 0 0 20px rgba(255,255,0,.04);
}
.lb-row.rank-2 { border-left-color:#00ffff; }
.lb-row.rank-3 { border-left-color:#ff00ff; }

/* sweep */
.lb-row::before {
  content:''; position:absolute;
  top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,0,255,.06),transparent);
  transition:none;
}
.lb-row.updated::before {
  animation:rowSweep .5s ease forwards;
}
@keyframes rowSweep { to{left:200%} }

.rank-num {
  font-family:'Orbitron', monospace;
  font-size:13px; font-weight:900;
  width:22px; text-align:center; flex-shrink:0;
}
.rank-1 .rank-num { color:#ffff00; text-shadow:0 0 10px #ffff00; }
.rank-2 .rank-num { color:#00ffff; text-shadow:0 0 10px #00ffff; }
.rank-3 .rank-num { color:#ff00ff; text-shadow:0 0 10px #ff00ff; }
.lb-row:not(.rank-1):not(.rank-2):not(.rank-3) .rank-num { color:#ffffff66; }

.avatar-sm {
  width:32px; height:32px; border-radius:50%;
  object-fit:cover; flex-shrink:0;
  border:1.5px solid rgba(255,0,255,.4);
  background:#111;
}
.avatar-sm-fallback {
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg,#f0f2,#0ff2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px; flex-shrink:0;
}

.row-name {
  font-family:'Orbitron', monospace;
  font-size:10px; font-weight:700;
  color:#fff; letter-spacing:.04em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  flex:1;
}

.like-count {
  font-family:'Share Tech Mono', monospace;
  font-size:13px; font-weight:700;
  color:#ff00ff;
  text-shadow:0 0 10px #ff00ff88;
  flex-shrink:0;
  white-space:nowrap;
}
.rank-1 .like-count { color:#ffff00; text-shadow:0 0 10px #ffff0088; }

/* bar mini */
.bar-fill {
  position:absolute; bottom:0; left:0; height:2px;
  background:linear-gradient(90deg,#ff00ff,#ffff00);
  transition:width .6s ease;
  box-shadow:0 0 6px #ff00ff;
}
</style>
</head>
<body>
<div id="board">
  <div class="board-header">TOP TAPPER <div class="pulse-dot"></div></div>
</div>

<script>
// likeData: { userId: { nickname, profilePicture, likes } }
const likeData = {};
const MAX_SHOW  = 5;

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateBoard(){
  const board   = document.getElementById('board');
  const sorted  = Object.values(likeData)
    .sort((a,b)=>b.likes-a.likes)
    .slice(0,MAX_SHOW);

  const maxLike = sorted[0]?.likes || 1;

  // Hapus semua row lama
  board.querySelectorAll('.lb-row').forEach(r=>r.remove());

  sorted.forEach((item,i)=>{
    const rank = i+1;
    const pct  = Math.round((item.likes/maxLike)*100);

    const avatarHTML = item.profilePicture
      ? `<img class="avatar-sm" src="${item.profilePicture}" onerror="this.outerHTML='<div class=\\'avatar-sm-fallback\\'>◈</div>'" alt="">`
      : `<div class="avatar-sm-fallback">◈</div>`;

    const rankLabel = rank===1?'👑':rank===2?'②':rank===3?'③':rank;

    const row = document.createElement('div');
    row.className = `lb-row rank-${rank}`;
    row.style.animationDelay = `${i*0.05}s`;
    row.innerHTML = `
      ${avatarHTML}
      <div class="rank-num">${rankLabel}</div>
      <div class="row-name">${esc(item.nickname)}</div>
      <div class="like-count">♥ ${item.likes.toLocaleString()}</div>
      <div class="bar-fill" style="width:${pct}%"></div>
    `;
    board.appendChild(row);
  });
}

function handleLike(d){
  const uid = d.user;
  if(!uid) return;
  if(!likeData[uid]){
    likeData[uid] = { nickname: d.nickname||uid, profilePicture: d.profilePicture||'', likes:0 };
  }
  // likeCount = like yang dikirim sekarang (bisa 1-15)
  likeData[uid].likes += (d.likeCount || 1);
  likeData[uid].nickname = d.nickname || likeData[uid].nickname;
  updateBoard();
}

function connect(){
  const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`);
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if(d.type==='like') handleLike(d);
    // Reset board saat connect baru
    if(d.type==='status' && d.status==='connected'){
      Object.keys(likeData).forEach(k=>delete likeData[k]);
      updateBoard();
    }
  };
  ws.onclose = ()=>setTimeout(connect,3000);
}
connect();
</script>
</body></html>
