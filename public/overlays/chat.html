<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: transparent;
  overflow: hidden;
  width: 100vw; height: 100vh;
  perspective: 1200px;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,255,255,.015) 2px,
    rgba(0,255,255,.015) 4px
  );
  pointer-events:none;
  z-index:999;
}

#chat-container {
  position: fixed;
  bottom: 28px;
  left: 24px;
  width: 420px;
}

/* ── CARD ── */
.chat-card {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  opacity: 0;
  animation: cardIn .6s cubic-bezier(.22,1,.36,1) forwards;
  transform-origin: left center;
  position: relative;
}

@keyframes cardIn {
  0%   { opacity:0; transform: translateX(-40px) rotateY(-20deg) scale(.9); }
  60%  { opacity:1; transform: translateX(6px) rotateY(3deg) scale(1.01); }
  100% { opacity:1; transform: translateX(0) rotateY(0deg) scale(1); }
}
@keyframes cardOut {
  to { opacity:0; transform: translateX(-20px) rotateY(-15deg) scale(.92); }
}

/* ── AVATAR ── */
.avatar-wrap { flex-shrink:0; position:relative; margin-top:2px; }

.avatar-ring {
  width:48px; height:48px;
  border-radius:50%;
  position:relative;
  display:flex; align-items:center; justify-content:center;
}
.avatar-ring::before {
  content:'';
  position:absolute; inset:-3px;
  border-radius:50%;
  background: conic-gradient(#00ffff, #ff00ff, #00ffff);
  animation: spinRing 2.5s linear infinite;
  z-index:0;
}
.avatar-ring::after {
  content:'';
  position:absolute; inset:-1px;
  border-radius:50%;
  background: #0a0a14;
  z-index:1;
}
@keyframes spinRing { to { transform:rotate(360deg); } }

.avatar {
  width:44px; height:44px;
  border-radius:50%;
  object-fit:cover;
  display:block;
  position:relative; z-index:2;
  background:#111;
}
.avatar-fallback {
  width:44px; height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,#0ff2,#f0f2);
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  position:relative; z-index:2;
}

/* ── BUBBLE ── */
.bubble-wrap { flex:1; min-width:0; }

.username {
  font-family:'Orbitron', monospace;
  font-size:10px; font-weight:700;
  color:#00ffff;
  letter-spacing:.15em; text-transform:uppercase;
  margin-bottom:5px; padding-left:3px;
  text-shadow:0 0 10px #00ffff, 0 0 20px #00ffff88;
  display:flex; align-items:center; gap:6px;
}
.username::before {
  content:'▶';
  font-size:7px; color:#ff00ff;
  text-shadow:0 0 8px #ff00ff;
  animation:blink2 1.2s step-end infinite;
}
@keyframes blink2 { 50%{opacity:0} }

.bubble {
  font-family:'Share Tech Mono', monospace;
  font-size:14px; color:#e0ffe0;
  line-height:1.6;
  background:linear-gradient(135deg, rgba(0,20,30,.88), rgba(0,10,20,.92));
  border:1px solid rgba(0,255,255,.3);
  border-left:3px solid #00ffff;
  border-radius:0 12px 12px 12px;
  padding:10px 14px;
  position:relative; overflow:hidden;
  word-break:break-word;
  backdrop-filter:blur(16px);
  box-shadow:
    0 0 20px rgba(0,255,255,.08),
    0 4px 30px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(0,255,255,.1);
  animation:floatBubble 3.5s ease-in-out infinite;
}
@keyframes floatBubble {
  0%,100% { transform:translateY(0) rotateX(0); box-shadow:0 0 20px rgba(0,255,255,.08),0 4px 30px rgba(0,0,0,.5); }
  50%     { transform:translateY(-4px) rotateX(2deg); box-shadow:0 0 30px rgba(0,255,255,.15),0 10px 40px rgba(0,0,0,.6); }
}

.bubble::before {
  content:'';
  position:absolute;
  top:-100%; left:0; right:0; height:40%;
  background:linear-gradient(180deg,transparent,rgba(0,255,255,.06),transparent);
  animation:sweep 3s ease-in-out infinite;
}
@keyframes sweep { 0%{top:-40%} 100%{top:140%} }

.bubble::after {
  content:'';
  position:absolute;
  top:4px; right:4px;
  width:6px; height:6px;
  border-top:1px solid #00ffff88;
  border-right:1px solid #00ffff88;
}

.bubble.glitch {
  animation:floatBubble 3.5s ease-in-out infinite, glitch .15s steps(2) 1;
}
@keyframes glitch {
  0%  { transform:translateX(0) skewX(0); filter:none; }
  25% { transform:translateX(-3px) skewX(-2deg); filter:hue-rotate(90deg); }
  50% { transform:translateX(3px) skewX(2deg); filter:hue-rotate(-90deg); }
  75% { transform:translateX(-1px); filter:none; }
  100%{ transform:translateX(0); }
}

.cursor {
  display:inline-block;
  width:8px; height:14px;
  background:#00ffff;
  margin-left:2px; vertical-align:middle;
  animation:cursorBlink .5s step-end infinite;
  box-shadow:0 0 8px #00ffff, 0 0 16px #00ffff88;
  border-radius:1px;
}
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

.hex-tag {
  font-family:'Share Tech Mono', monospace;
  font-size:9px; color:#ffffff33;
  position:absolute; bottom:4px; right:8px;
  letter-spacing:.05em;
}

/* Progress bar — juga sebagai timer countdown */
.load-bar {
  height:2px;
  background:linear-gradient(90deg,#00ffff,#ff00ff);
  border-radius:1px;
  margin-bottom:4px;
  width:100%;
  box-shadow:0 0 8px #00ffff;
  transform-origin:left;
  transition:none;
}
.load-bar.countdown {
  transition:width 5s linear;
  width:0% !important;
}
</style>
</head>
<body>
<div id="chat-container"></div>

<script>
const SPD      = 22;    // kecepatan ngetik (ms per huruf)
const LIFE     = 5000;  // tampil 5 detik setelah TTS selesai (fallback)
const container = document.getElementById('chat-container');

// ── QUEUE SYSTEM ──
const queue   = [];
let busy      = false;
let ttsEnabled = true;

// Deteksi apakah browser support TTS
if (!window.speechSynthesis) ttsEnabled = false;

function hex(n){ return n.toString(16).toUpperCase().padStart(4,'0'); }
function rnd(a,b){ return Math.floor(Math.random()*(b-a))+a; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Masukkan chat ke antrian
function enqueue(data) {
  queue.push(data);
  if (!busy) processNext();
}

// Proses satu chat dari antrian
function processNext() {
  if (queue.length === 0) { busy = false; return; }
  busy = true;
  const data = queue.shift();
  showCard(data);
}

function showCard(data) {
  const name = data.nickname || data.user || 'UNKNOWN';
  const text = data.comment || '';
  const pic  = data.profilePicture || '';

  // Hapus card lama kalau masih ada
  const old = container.querySelector('.chat-card');
  if (old) old.remove();

  const card = document.createElement('div');
  card.className = 'chat-card';

  const avatarHTML = pic
    ? `<img class="avatar" src="${pic}" onerror="this.outerHTML='<div class=\\'avatar-fallback\\'>◈</div>'" alt="">`
    : `<div class="avatar-fallback">◈</div>`;

  const hexId = `#${hex(rnd(0,65535))}`;

  card.innerHTML = `
    <div class="avatar-wrap">
      <div class="avatar-ring">${avatarHTML}</div>
    </div>
    <div class="bubble-wrap">
      <div class="load-bar" id="lb"></div>
      <div class="username">${esc(name)}</div>
      <div class="bubble">
        <span class="typed-text"></span><span class="cursor"></span>
        <span class="hex-tag">${hexId}</span>
      </div>
    </div>
  `;
  container.appendChild(card);

  // Glitch sesekali
  const bubble = card.querySelector('.bubble');
  setTimeout(() => {
    bubble.classList.add('glitch');
    setTimeout(() => bubble.classList.remove('glitch'), 200);
  }, rnd(400, 900));

  // Animasi ngetik
  const typedEl  = card.querySelector('.typed-text');
  const cursorEl = card.querySelector('.cursor');
  typeText(typedEl, cursorEl, text);

  // TTS
  speakTTS(name, text, () => {
    // Setelah TTS selesai → countdown bar lalu hapus card & proses berikutnya
    startCountdown(card, () => {
      removeCard(card, () => processNext());
    });
  });
}

// Countdown bar 5 detik lalu callback
function startCountdown(card, cb) {
  const lb = card.querySelector('#lb');
  if (lb) {
    lb.style.transition = 'none';
    lb.style.width = '100%';
    // Force reflow
    lb.getBoundingClientRect();
    lb.classList.add('countdown');
  }
  setTimeout(cb, LIFE);
}

function removeCard(card, cb) {
  if (!card.parentNode) { cb(); return; }
  card.style.animation = 'cardOut .4s ease forwards';
  setTimeout(() => { card.remove(); cb(); }, 400);
}

// TTS — baca nama + isi chat, callback setelah selesai
function speakTTS(name, text, onDone) {
  if (!ttsEnabled || !text.trim()) {
    // Kalau TTS off, langsung countdown
    setTimeout(() => {
      const card = container.querySelector('.chat-card');
      if (card) startCountdown(card, () => removeCard(card, () => processNext()));
    }, 300);
    onDone();
    return;
  }

  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(`${name} bilang: ${text}`);
  utterance.lang  = 'id-ID';
  utterance.rate  = 1.1;
  utterance.pitch = 1;
  utterance.volume = 1;

  utterance.onend = () => onDone();
  utterance.onerror = () => onDone(); // fallback kalau error

  window.speechSynthesis.speak(utterance);
}

// Animasi mengetik
function typeText(el, cursor, text) {
  const max = 140;
  const str = text.length > max ? text.slice(0, max) + '…' : text;
  let i = 0;
  const typoAt = rnd(3, Math.max(4, str.length - 3));
  let didTypo = false;

  function next() {
    if (i < str.length) {
      if (i === typoAt && !didTypo && str.length > 8) {
        didTypo = true;
        const fakeChar = String.fromCharCode(str.charCodeAt(i) + rnd(1,3));
        el.textContent += fakeChar;
        setTimeout(() => {
          el.textContent = el.textContent.slice(0,-1);
          setTimeout(next, SPD);
        }, rnd(80,160));
        return;
      }
      el.textContent += str[i++];
      const delay = str[i-1]===' ' ? SPD*1.5 : SPD+rnd(-8,12);
      setTimeout(next, delay);
    } else {
      if (cursor) setTimeout(() => {
        cursor.style.animation = 'none';
        cursor.style.opacity   = '0';
      }, 1200);
    }
  }
  next();
}

// WebSocket dengan auto-reconnect
function connect() {
  const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`);
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'chat') enqueue(d);
  };
  ws.onclose = () => setTimeout(connect, 3000);
}
connect();
</script>
</body></html>
